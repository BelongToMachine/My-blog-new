<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Full-Width Bézier Curve</title>
    <style>
      .example {
        width: 100vw; /* Full width */
        height: 700px; /* Fixed height */
        display: block;
      }
    </style>
  </head>
  <body>
    <svg viewBox="0 0 100 100" class="example" preserveAspectRatio="none">
      <path
        d="M 0,80 C 50,40 50,100 100,80"
        fill="none"
        stroke="hotpink"
        stroke-width="3"
      />
    </svg>
  </body>
</html>
